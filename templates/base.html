<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }}{% endblock %}</title>
    <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
    <meta name="author" content="{{ config.author }}">

    <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock %}">
    <meta property="og:description" content="{{ config.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ config.base_url }}">
    <meta property="og:image" content="{{ get_url(path='logo.png') }}">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:image" content="{{ get_url(path='logo.png') }}">

    <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
    <link rel="alternate" type="application/atom+xml" title="{{ config.title }}" href="{{ get_url(path='atom.xml') }}">
    <link rel="icon" type="image/svg+xml" href="{{ get_url(path='logo.svg') }}">
</head>
{% set logo_svg = load_data(path="static/logo.svg", format="plain") %}
<body>
    <header class="site-header">
        <div class="container">
            <a href="{{ config.base_url }}" class="site-logo">
                <span class="logo-mark">{{ logo_svg | safe }}</span>
                <span class="logo-text">Jon's Lab</span>
            </a>
            <nav class="site-nav">
                <a href="{{ get_url(path='@/_index.md') }}" {% if current_path == "/" %}class="active"{% endif %}>Home</a>
                <a href="{{ get_url(path='@/about/_index.md') }}" {% if current_path is starting_with("/about") %}class="active"{% endif %}>About</a>
                <a href="{{ get_url(path='@/projects/_index.md') }}" {% if current_path is starting_with("/projects") %}class="active"{% endif %}>Projects</a>
                <a href="{{ get_url(path='@/blog/_index.md') }}" {% if current_path is starting_with("/blog") %}class="active"{% endif %}>Journal</a>
                <a href="{{ get_url(path='@/contact/_index.md') }}" {% if current_path is starting_with("/contact") %}class="active"{% endif %}>Contact</a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <span class="footer-mark">{{ logo_svg | safe }}</span>
                <span class="footer-text">&copy; {{ now() | date(format="%Y") }} Jon's Lab. Forged from first principles.</span>
            </div>
        </div>
    </footer>
</body>
</html>
