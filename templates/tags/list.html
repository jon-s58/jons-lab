{% extends "base.html" %}

{% block title %}Tags | {{ config.title }}{% endblock %}

{% block content %}
<section class="page-content">
    <h1>Tags</h1>
    <div class="tag-list">
        {% for term in terms %}
        <a href="{{ term.permalink }}" class="tag-item">
            {{ term.name }} <span class="tag-count">({{ term.pages | length }})</span>
        </a>
        {% endfor %}
    </div>
</section>
{% endblock %}
